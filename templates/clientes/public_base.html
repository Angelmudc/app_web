<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Solicitud pública | Doméstica del Cibao A&D{% endblock %}</title>
  <meta name="description" content="Flujo público de solicitud - Doméstica del Cibao A&D">
  <meta name="csrf-token" content="{{ csrf_token() }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root { --public-font: "Inter", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    body.public-flow {
      font-family: var(--public-font);
      min-height: 100vh;
      color: #0f172a;
    }

    .public-flash-wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px 14px 0;
    }

    .public-flash {
      border-radius: 12px;
      border: 1px solid #d8e1ee;
      font-size: .93rem;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
    }

    .public-flash.success { background: #eefaf2; color: #14532d; border-color: #bde7cb; }
    .public-flash.warning { background: #fff8e8; color: #854d0e; border-color: #f3ddad; }
    .public-flash.danger,
    .public-flash.error { background: #fff2f2; color: #991b1b; border-color: #fecaca; }
    .public-flash.info,
    .public-flash.primary { background: #eef6ff; color: #1e3a8a; border-color: #bfdbfe; }
  </style>

  {% block head %}{% endblock %}
</head>
<body class="public-flow" data-live-presence-enabled="0" data-live-presence-url="">
  <div class="public-flash-wrap">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, text in messages %}
          <div class="alert public-flash {{ category }} mb-2" role="alert">{{ text }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
  </div>

  <main>
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
