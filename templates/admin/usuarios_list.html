{% extends 'base.html' %}
{% block title %}Gestión de usuarios y roles{% endblock %}

{% block content %}
<div class="py-1 clientes-shell">
  <div class="glass-card p-3 p-md-4">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
      <h1 class="h3 mb-0">Gestión de usuarios y roles</h1>
      <a href="{{ url_for('admin.crear_usuario') }}" class="btn btn-success">
        <i class="fa-solid fa-user-plus"></i> Nuevo usuario
      </a>
    </div>
    <p class="text-muted mb-3">Administra desde aquí creación, edición, roles y estado de acceso del equipo staff.</p>

    <form class="row g-2 align-items-center mb-3"
          method="get"
          action="{{ url_for('admin.listar_usuarios') }}"
          data-admin-async-form
          data-async-target="#usuariosAsyncRegion"
          data-async-busy-container="#usuariosAsyncScope"
          data-async-preserve-scroll="true"
          data-async-fallback="native">
      <div class="col-12 col-md">
        <input name="q" class="form-control" placeholder="Buscar por username o email" value="{{ q }}">
      </div>
      <div class="col-6 col-md-auto">
        <select name="per_page" class="form-select">
          {% for n in [10,20,50,100] %}
            <option value="{{n}}" {% if per_page==n %}selected{% endif %}>{{n}} por página</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-6 col-md-auto">
        <button class="btn btn-outline-secondary w-100" data-loading-text="Buscando...">
          <i class="fa-solid fa-magnifying-glass"></i> Buscar
        </button>
      </div>
    </form>

    <div id="usuariosAsyncScope" data-admin-async-scope>
      <div id="usuariosAsyncRegion" data-async-preserve-scroll="true">
        {% include 'admin/_usuarios_list_results.html' %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
