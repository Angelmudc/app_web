{% extends 'base.html' %}
{% block title %}Seguridad · Locks de edición{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 mb-0">Locks de edición</h1>
    <div class="d-flex align-items-center gap-2">
      <a class="btn btn-outline-primary btn-sm"
         href="{{ url_for('admin.seguridad_locks') }}"
         data-admin-async-link
         data-async-target="#seguridadLocksAsyncRegion"
         data-async-busy-container="#seguridadLocksAsyncScope"
         data-async-fallback="native">
        Actualizar
      </a>
      <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('admin.monitoreo_staff') }}">Volver a Control Room</a>
    </div>
  </div>
  <div id="seguridadLocksAsyncScope" data-admin-async-scope>
    <div id="seguridadLocksAsyncRegion" data-async-preserve-scroll="true">
      {% include 'admin/_seguridad_locks_region.html' %}
    </div>
  </div>
</div>
{% endblock %}
