{% extends 'base.html' %}
{% block title %}Matching de Solicitudes{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 mb-0">Matching de Solicitudes</h1>
    <div class="d-flex gap-2">
      <a href="{{ url_for('admin.matching_solicitudes') }}"
         class="btn btn-outline-primary"
         data-admin-async-link
         data-async-target="#matchingSolicitudesAsyncRegion"
         data-async-busy-container="#matchingSolicitudesAsyncScope"
         data-async-fallback="native">Actualizar</a>
      <a href="{{ url_for('home') }}" class="btn btn-outline-secondary">Inicio</a>
    </div>
  </div>

  <div id="matchingSolicitudesAsyncScope" data-admin-async-scope>
    <div id="matchingSolicitudesAsyncRegion">
      {% include 'admin/_matching_solicitudes_region.html' %}
    </div>
  </div>
</div>
{% endblock %}
