{% extends 'base.html' %}

{% block title %}Verificación MFA{% endblock %}

{% block content %}
<main class="container py-4" style="max-width: 520px;">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h1 class="h5 mb-2">Introduce código de verificación</h1>
      <p class="text-muted mb-3">Usuario: <strong>{{ username }}</strong></p>

      {% if error %}
        <div class="alert alert-danger" role="alert">{{ error }}</div>
      {% endif %}

      <form method="post" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label for="code" class="form-label">Código TOTP (6 dígitos)</label>
          <input
            type="text"
            inputmode="numeric"
            pattern="[0-9]{6}"
            maxlength="6"
            class="form-control"
            id="code"
            name="code"
            placeholder="123456"
            required
            autofocus>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Validar y entrar</button>
        </div>
      </form>

      <form method="post" action="{{ url_for('admin.mfa_cancel') }}" class="mt-3">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button type="submit" class="btn btn-outline-secondary btn-sm">Cancelar</button>
      </form>
    </div>
  </div>
</main>
{% endblock %}
