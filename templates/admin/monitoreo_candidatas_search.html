{% extends 'base.html' %}
{% block title %}Monitoreo · Buscar candidata{% endblock %}
{% block content %}
<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-3 gap-2 flex-wrap">
    <h1 class="h3 mb-0">Buscar candidata</h1>
    <a class="btn btn-outline-dark btn-sm" href="{{ url_for('admin.monitoreo_staff') }}">Volver a monitoreo</a>
  </div>

  <form method="get"
        class="row g-2 mb-3"
        action="{{ url_for('admin.monitoreo_candidatas_search') }}"
        data-admin-async-form
        data-async-target="#monitoreoCandidatasAsyncRegion"
        data-async-busy-container="#monitoreoCandidatasAsyncScope"
        data-async-preserve-scroll="true"
        data-async-fallback="native">
    <div class="col-md-9">
      <input class="form-control" type="text" name="q" value="{{ q }}" placeholder="Nombre, cédula, código o fila">
    </div>
    <div class="col-md-1">
      <input class="form-control" type="number" min="1" max="50" name="limit" value="{{ limit or 20 }}">
    </div>
    <div class="col-md-2">
      <button class="btn btn-primary w-100" type="submit">Buscar</button>
    </div>
  </form>

  <div class="mb-3">
    <a class="btn btn-outline-secondary btn-sm"
       href="{{ url_for('admin.monitoreo_candidatas_search') }}"
       data-admin-async-link
       data-async-target="#monitoreoCandidatasAsyncRegion"
       data-async-busy-container="#monitoreoCandidatasAsyncScope"
       data-async-preserve-scroll="true">Limpiar</a>
  </div>

  <div id="monitoreoCandidatasAsyncScope" data-admin-async-scope>
    <div id="monitoreoCandidatasAsyncRegion" data-async-preserve-scroll="true">
      {% include 'admin/_monitoreo_candidatas_search_results.html' %}
    </div>
  </div>
</div>
{% endblock %}
