<div class="table-responsive">
  <table class="table table-sm table-striped align-middle">
    <thead><tr><th>Usuaria</th><th>Rol</th><th>IP</th><th>Ruta actual</th><th>Última actividad</th><th>Acción</th></tr></thead>
    <tbody>
      {% for s in sessions_rows %}
      <tr>
        <td>{{ s.username }}</td>
        <td>{{ s.role }}</td>
        <td><small>{{ s.ip or '-' }}</small></td>
        <td><small>{{ s.current_path or '-' }}</small></td>
        <td>{{ s.last_seen_seconds }}s</td>
        <td>
          <form method="post"
                action="{{ url_for('admin.seguridad_sesiones_cerrar') }}"
                class="d-inline"
                data-admin-async-form
                data-async-target="#seguridadSesionesAsyncRegion"
                data-async-busy-container="#seguridadSesionesAsyncScope"
                data-async-fallback="native">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="user_id" value="{{ s.user_id }}">
            <input type="hidden" name="next" value="{{ request.path }}">
            <input type="hidden" name="_async_target" value="#seguridadSesionesAsyncRegion">
            <button class="btn btn-sm btn-outline-danger" type="submit">Cerrar sesión</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="6" class="text-muted">No hay sesiones activas.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
