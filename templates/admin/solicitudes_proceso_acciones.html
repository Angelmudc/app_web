{% extends 'base.html' %}
{% block title %}⚡ Acciones Rápidas – Solicitudes en Proceso{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 1100px;">

  <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap mb-3">
    <div>
      <h1 class="h4 mb-1">⚡ Acciones rápidas</h1>
      <div class="text-muted">Solicitudes en estado <b>proceso</b></div>
    </div>

    <a href="{{ url_for('admin.listar_clientes') }}" class="btn btn-outline-secondary">
      ← Volver a Clientes

  <div id="procesoAccionesAsyncScope" data-admin-async-scope>
    <div id="procesoAccionesAsyncRegion" data-async-preserve-scroll="true">
      {% include 'admin/_solicitudes_proceso_acciones_results.html' %}
