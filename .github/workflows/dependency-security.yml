name: Dependency Supply Chain Security

on:
  pull_request:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 9 * * 1"

jobs:
  dependency-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install app dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install security tooling
        run: |
          pip install pip-audit cyclonedx-bom pipdeptree safety

      - name: Enforce dependency policy
        run: |
          python scripts/security/validate_dependency_policy.py \
            --requirements requirements.txt \
            --allowlist security/dependency_allowlist.txt \
            --denylist security/dependency_denylist.txt

      - name: Run pip-audit (JSON report)
        run: |
          mkdir -p .reports
          set +e
          pip-audit -r requirements.txt --format json -o .reports/pip-audit-ci.json
          rc=$?
          set -e
          if [ "$rc" -gt 1 ]; then
            exit "$rc"
          fi

      - name: Enforce pip-audit gate
        run: |
          python scripts/security/pip_audit_gate.py \
            --report .reports/pip-audit-ci.json \
            --ignore-file security/pip_audit_ignore.txt

      - name: Generate SBOM (CycloneDX)
        run: |
          set +e
          pip-audit -r requirements.txt --format cyclonedx-json -o .reports/sbom.cyclonedx.json
          rc=$?
          set -e
          if [ "$rc" -gt 1 ]; then
            exit "$rc"
          fi

      - name: Export dependency tree
        run: |
          pipdeptree --warn silence > .reports/pipdeptree-ci.txt

      - name: Run safety (optional telemetry report)
        continue-on-error: true
        run: |
          set +e
          safety check -r requirements.txt --json > .reports/safety-ci.json
          true

      - name: Upload security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-security-reports
          path: .reports/
