services:
  - type: cron
    name: app-web-backup-cron
    runtime: python
    schedule: "30 2 * * *"
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
      pip install -r requirements-ops-backup.txt
    startCommand: bash scripts/ops/backup_nightly.sh
    envVars:
      - key: APP_ENV
        value: production
      - key: BACKUP_ROOT
        value: /tmp/app_web_backups
      - key: RETENTION_DAYS
        value: "14"
      - key: ENABLE_REMOTE_SHIP
        value: "1"
      - key: BACKUP_REMOTE_PROVIDER
        value: s3
      - key: BACKUP_REMOTE_BUCKET
        sync: false
      - key: BACKUP_REMOTE_PREFIX
        value: app_web/backups
      - key: S3_OBJECT_LOCK_MODE
        value: GOVERNANCE
      - key: S3_OBJECT_LOCK_DAYS
        value: "30"
      - key: DATABASE_URL
        fromDatabase:
          name: app-web-db
          property: connectionString
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_DEFAULT_REGION
        value: us-east-1
